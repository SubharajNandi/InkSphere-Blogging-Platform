<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — InkSphere</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Ink<span class="dot">Sphere</span></a>
      <div class="nav-actions" data-nav-auth-slot></div>
      <button class="nav-burger" data-nav-burger aria-label="Open menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </header>

  <main class="auth-shell">
    <section class="auth-panel">
      <div class="auth-form-wrap">
        <h1 class="display-md">Welcome back</h1>
        <p class="auth-subtitle body-md">Sign in to keep writing, reading, and replying.</p>

        <div class="auth-form-error hidden" data-form-error></div>

        <form data-login-form novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input class="input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="password-field">
              <input class="input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
              <button type="button" class="password-toggle" data-toggle-password aria-label="Show password">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="auth-forgot">
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Sign in</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="register.html" class="link">Create one</a></p>
      </div>
    </section>

    <aside class="auth-side">
      <p class="auth-side-quote">"Every post you publish becomes <span>part of someone's morning</span> — make it worth reading."</p>
      <div class="auth-side-footer">
        <div class="auth-side-avatars">
          <span class="avatar avatar-sm avatar-fallback" style="background:#ea2804">JM</span>
          <span class="avatar avatar-sm avatar-fallback" style="background:#202020">RS</span>
          <span class="avatar avatar-sm avatar-fallback" style="background:#2b9a66">AT</span>
        </div>
        <span>Joined by 4,200+ writers on InkSphere</span>
      </div>
    </aside>
  </main>

  <div class="mobile-drawer" data-mobile-drawer>
    <div class="mobile-drawer-panel">
      <button class="mobile-drawer-close" data-mobile-drawer-close aria-label="Close menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Explore</a></li>
      </ul>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    document.querySelector('[data-toggle-password]')?.addEventListener('click', (e) => {
      const input = document.getElementById('password');
      const isPw = input.type === 'password';
      input.type = isPw ? 'text' : 'password';
      e.currentTarget.setAttribute('aria-label', isPw ? 'Hide password' : 'Show password');
    });
  </script>
</body>
</html>

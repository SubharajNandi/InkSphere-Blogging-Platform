<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit post — InkSphere</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

  <header class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Ink<span class="dot">Sphere</span></a>
      <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="blog.html">Explore</a></li>
      </ul>
      <div class="nav-actions">
        <div data-nav-auth-slot></div>
      </div>
      <button class="nav-burger" data-nav-burger aria-label="Open menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </header>

  <main class="editor-shell">
    <div class="editor-toolbar">
      <h1 class="heading-md" id="editorPageTitle">Edit post</h1>
      <div class="editor-toolbar-actions">
        <a href="dashboard.html" class="btn btn-ghost btn-sm">Cancel</a>
      </div>
    </div>

    <div class="auth-form-error hidden" id="editorFormError"></div>

    <form id="postEditorForm">
      <input type="text" id="editorTitleInput" class="editor-title-input" placeholder="Your post title" required>

      <div class="editor-cover-drop" id="editorCoverDrop">
        <button type="button" class="editor-cover-remove" id="coverRemoveBtn" aria-label="Remove cover image">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <div class="editor-cover-drop-label">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin: 0 auto 8px;"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
          <p class="body-sm">Click to add a cover image (optional)</p>
        </div>
        <input type="file" id="coverFileInput" accept="image/*">
      </div>

      <div class="editor-format-bar">
        <button type="button" class="format-btn" data-format="bold" aria-label="Bold" title="Bold"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4h8a4 4 0 0 1 0 8H6z"/><path d="M6 12h9a4 4 0 0 1 0 8H6z"/></svg></button>
        <button type="button" class="format-btn" data-format="italic" aria-label="Italic" title="Italic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
        <button type="button" class="format-btn" data-format="insertUnorderedList" aria-label="Bulleted list" title="Bulleted list"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
        <button type="button" class="format-btn" data-format="formatBlock" data-value="h2" aria-label="Heading" title="Heading">H2</button>
        <button type="button" class="format-btn" data-format="createLink" aria-label="Insert link" title="Insert link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg></button>
        <button type="button" class="format-btn" data-format="formatBlock" data-value="blockquote" aria-label="Quote" title="Quote">&ldquo;</button>
      </div>

      <div class="editor-content-area" id="editorContentArea" contenteditable="true" data-placeholder="Start writing…"></div>

      <div class="editor-sidebar-fields">
        <div class="field">
          <label for="tagInput">Tags <span class="text-mute">(up to 5)</span></label>
          <div class="tag-input-wrap" id="tagInputWrap">
            <input type="text" id="tagInput" placeholder="Add a tag and press Enter">
          </div>
        </div>
        <div class="field">
          <label for="editorStatusSelect">Status</label>
          <select id="editorStatusSelect" class="input">
            <option value="draft">Save as draft</option>
            <option value="published">Published</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="editorPublishBtn">Save changes</button>
    </form>
  </main>

  <div class="mobile-drawer" data-mobile-drawer>
    <div class="mobile-drawer-panel">
      <button class="mobile-drawer-close" data-mobile-drawer-close aria-label="Close menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="blog.html">Explore</a></li>
      </ul>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/post.js"></script>
  <script>
    document.querySelectorAll('[data-format="formatBlock"]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('editorContentArea').focus();
        document.execCommand('formatBlock', false, btn.dataset.value);
      });
    });
    document.addEventListener('DOMContentLoaded', () => PostEditor.init('edit'));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — InkSphere</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/post.css">
</head>
<body>

  <header class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Ink<span class="dot">Sphere</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Explore</a></li>
      </ul>
      <div class="nav-actions">
        <div data-nav-auth-slot></div>
      </div>
      <button class="nav-burger" data-nav-burger aria-label="Open menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </header>

  <main id="postRoot">
    <article>
      <header class="post-header">
        <div class="post-tags-row" id="postTagsRow"></div>
        <h1 class="display-lg post-detail-title" id="postTitle">Loading post…</h1>

        <div class="post-author-row">
          <div class="post-author-info">
            <span id="postAuthorAvatar"></span>
            <div>
              <div class="author-name" id="postAuthorName">—</div>
              <div class="author-meta" id="postAuthorMeta">—</div>
            </div>
          </div>
          <div class="post-owner-actions hidden" id="postOwnerActions"></div>
        </div>
      </header>

      <div class="post-cover-wrap" id="postCoverWrap"></div>

      <div class="post-body" id="postBody">
        <div class="skeleton" style="height:18px;width:90%;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:18px;width:80%;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:18px;width:95%;margin-bottom:12px;"></div>
      </div>

      <div class="post-engage-row">
        <button type="button" class="like-btn" id="postLikeBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
          <span id="likeCount">0</span>
        </button>
      </div>

      <section class="comments-section">
        <h2 class="heading-md comments-heading"><span id="commentCount">0</span> Comments</h2>

        <div class="comment-login-prompt hidden" id="commentLoginPrompt">
          <span class="body-md">Sign in to join the conversation.</span>
          <a href="login.html" class="btn btn-outline btn-sm">Sign in</a>
        </div>

        <form class="comment-form" id="commentForm">
          <div class="comment-form-body">
            <textarea class="input textarea" placeholder="Share your thoughts…" required></textarea>
            <div class="comment-form-actions">
              <button type="submit" class="btn btn-primary btn-sm">Post comment</button>
            </div>
          </div>
        </form>

        <div class="comment-list" id="commentList"></div>
      </section>
    </article>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© 2026 InkSphere. All rights reserved.</span>
        <a href="blog.html" class="link" style="color: var(--color-on-dark-mute);">Back to all posts</a>
      </div>
    </div>
  </footer>

  <div class="mobile-drawer" data-mobile-drawer>
    <div class="mobile-drawer-panel">
      <button class="mobile-drawer-close" data-mobile-drawer-close aria-label="Close menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="blog.html">Explore</a></li>
      </ul>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/post.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => PostPage.init());
  </script>
</body>
</html>
